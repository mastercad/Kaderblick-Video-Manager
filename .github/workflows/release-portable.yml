name: Portable Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libegl1 libgl1 libopengl0

      - name: Install FFmpeg on macOS
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install FFmpeg on Windows
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller pytest

      - name: Run packaging regression tests
        run: python -m pytest tests/test_runtime_paths.py tests/test_ffmpeg_runner.py tests/test_downloader.py -q

      - name: Build portable archive
        run: python scripts/build_portable.py

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: portable-${{ runner.os }}
          path: dist-artifacts/*

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: portable-*
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*